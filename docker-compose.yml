services:
  mysql:
    image: mysql:8.0
    container_name: sv-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: article
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sv-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      DB_USER: root
      DB_PASS: root123
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: article
      PORT: "8080"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: sv-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
